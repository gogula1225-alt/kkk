<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Keerthi 🎂</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e,#3a1c71);
  color:white;
  text-align:center;
  position:relative;
  font-family:'Montserrat', sans-serif;
}

/* ===== LOVE HEARTS ===== */
.love-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.heart{
  position:absolute;
  bottom:-40px;
  font-size:20px;
  animation:floatUp linear infinite;
  opacity:0.9;
  filter:drop-shadow(0 0 10px rgba(255,105,180,0.8));
}

@keyframes floatUp{
  from{transform:translateY(0) scale(0.8);opacity:0}
  to{transform:translateY(-120vh) scale(1.6);opacity:1}
}

/* ===== SPARKLES ===== */
.sparkle{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  background:rgba(255,255,255,0.9);
  animation:twinkle linear infinite;
  box-shadow:0 0 10px #fff;
}

@keyframes twinkle{
  from{transform:translateY(110vh) scale(0);opacity:0}
  to{transform:translateY(-10vh) scale(1);opacity:1}
}

/* ===== TEXT ===== */
.wrapper{
  z-index:2;
  position:relative;
}

.happy{
  font-family:'Cinzel', serif;
  font-size:3.2rem;
  letter-spacing:6px;
  text-transform:uppercase;
  animation:slideLeft 1.5s ease forwards;
  opacity:0;
  text-shadow:0 0 15px rgba(255,255,255,0.4);
}

.birthday{
  font-family:'Cinzel', serif;
  font-size:3.6rem;
  letter-spacing:8px;
  margin-top:10px;
  text-transform:uppercase;
  background:linear-gradient(90deg,#fff,#cdb4ff,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:slideRight 1.5s ease forwards;
  opacity:0;
  animation-delay:.4s;
}

/* ===== STYLISH NAME ===== */
.name{
  margin-top:30px;
  font-family:'Great Vibes', cursive;
  font-size:5.2rem;
  letter-spacing:4px;
  color:transparent;
  -webkit-text-stroke: 2px rgba(255,255,255,0.9);
  background:linear-gradient(90deg,#ffffff,#c77dff,#9d4edd,#ffffff);
  -webkit-background-clip:text;
  background-clip:text;
  text-shadow:
    0 0 15px rgba(255,255,255,0.4),
    0 0 35px rgba(199,125,255,0.7),
    0 0 60px rgba(157,78,221,0.8);
  opacity:0;
  animation:fadeUp 1.8s ease forwards, shimmer 4s linear infinite;
  animation-delay:1.2s;
}

@keyframes shimmer{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* ===== SUBTITLE ===== */
.subtitle{
  margin-top:18px;
  font-size:1rem;
  letter-spacing:3px;
  text-transform:uppercase;
  opacity:0;
  animation:fadeUp 2s ease forwards;
  animation-delay:2.2s;
}

/* ===== LINE ===== */
.glow-line{
  width:160px;
  height:3px;
  background:linear-gradient(90deg,transparent,#cdb4ff,transparent);
  margin:28px auto;
  opacity:0;
  animation:fadeUp 1.5s forwards;
  animation-delay:1.8s;
}

/* ===== ANIMATIONS ===== */
@keyframes slideLeft{
  from{transform:translateX(-120px); opacity:0}
  to{transform:translateX(0); opacity:1}
}

@keyframes slideRight{
  from{transform:translateX(120px); opacity:0}
  to{transform:translateX(0); opacity:1}
}

@keyframes fadeUp{
  from{transform:translateY(40px); opacity:0}
  to{transform:translateY(0); opacity:1}
}
</style>
</head>

<body>

<div class="love-layer" id="loveLayer"></div>

<div class="love-layer" id="sparkleLayer"></div>

<div class="wrapper">
  <div class="happy">HAPPY</div>
  <div class="birthday">BIRTHDAY</div>
  <div class="glow-line"></div>

  <div class="name">Keerthi</div>

  <div class="subtitle">A magical day made just for you ✨</div>
</div>

<script>
/* ===== HEARTS ===== */
const loveLayer = document.getElementById("loveLayer");

function createHeart(){
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💜";
  h.style.left = Math.random()*100 + "vw";
  h.style.animationDuration = (4 + Math.random()*4) + "s";
  h.style.fontSize = (18 + Math.random()*30) + "px";
  loveLayer.appendChild(h);
  setTimeout(()=>h.remove(),9000);
}
setInterval(createHeart,300);

/* ===== SPARKLES ===== */
const sparkleLayer = document.getElementById("sparkleLayer");

for(let i=0;i<70;i++){
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(4+Math.random()*6)+"s";
  sparkleLayer.appendChild(s);
}
</script>

</body>
</html>
