<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  font-family:'Montserrat',sans-serif;
  color:white;
  overflow:hidden;
}

/* floating hearts */
.love-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.heart{
  position:absolute;
  bottom:-30px;
  font-size:18px;
  animation:floatUp linear infinite;
  opacity:0.8;
  filter:drop-shadow(0 0 8px rgba(255,105,180,0.8));
}

@keyframes floatUp{
  from{transform:translateY(0) scale(0.8);opacity:0}
  to{transform:translateY(-120vh) scale(1.5);opacity:1}
}

/* main box */
.box{
  text-align:center;
  animation:fade 1.5s ease;
  width:100%;
  max-width:360px;
  z-index:2;
  padding:35px 25px;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  box-shadow:0 0 40px rgba(255,255,255,0.1);
}

/* text */
h1{
  font-family:'Playfair Display',serif;
  font-size:2.3rem;
  margin-bottom:10px;
  letter-spacing:1px;
  text-shadow:0 0 15px rgba(255,255,255,0.5);
}

p{
  font-size:1rem;
  opacity:.9;
  margin-top:5px;
}

/* button */
button{
  margin-top:28px;
  padding:14px 35px;
  border:none;
  border-radius:40px;
  font-size:1rem;
  cursor:pointer;
  width:100%;
  max-width:260px;
  background:linear-gradient(90deg,#c77dff,#9d4edd);
  color:white;
  font-weight:600;
  box-shadow:0 0 20px rgba(157,78,221,0.6);
  transition:.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 35px rgba(157,78,221,0.9);
}

@keyframes fade{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1}
}
</style>
</head>

<body>

<!-- floating love -->
<div class="love-layer" id="loveLayer"></div>

<div class="box">
  <h1>This Is For You 💜</h1>
  <p>Please take a moment…</p>
  <button onclick="go()">Continue</button>
</div>

<script>
function go(){
  location.href="wishes.html";
}

/* floating hearts */
const layer = document.getElementById("loveLayer");

function createHeart(){
  const h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💜";
  h.style.left = Math.random()*100 + "vw";
  h.style.animationDuration = (4 + Math.random()*4) + "s";
  h.style.fontSize = (14 + Math.random()*26) + "px";
  layer.appendChild(h);
  setTimeout(()=>h.remove(),9000);
}

setInterval(createHeart,400);
</script>

</body>
</html>
