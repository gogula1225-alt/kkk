<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Wish For You ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

html,body{
  scroll-behavior:smooth;
  overflow-x:hidden;
}

body{
  background:linear-gradient(135deg,#3a1c71,#5f2c82,#928dab);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  font-family:'Montserrat',sans-serif;
  color:white;
  padding:20px;
  margin:0;
  position:relative;
}

/* Floating hearts layer */
.love-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
  overflow:hidden;
}

.love{
  position:absolute;
  bottom:-30px;
  font-size:20px;
  animation:floatUp linear infinite;
  opacity:0.8;
  filter:drop-shadow(0 0 10px rgba(255,182,193,0.9));
}

@keyframes floatUp{
  from{
    transform:translateY(0) scale(0.8);
    opacity:0;
  }
  to{
    transform:translateY(-120vh) scale(1.6);
    opacity:1;
  }
}

/* Card */
.card{
  width:100%;
  max-width:390px;
  padding:28px;
  border-radius:28px;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);
  text-align:center;
  animation:appear 1.4s ease;
  position:relative;
  z-index:2;
  box-shadow:0 0 40px rgba(255,255,255,0.15);
}

/* Title */
h1{
  font-family:'Playfair Display',serif;
  font-size:1.8rem;
  margin-bottom:18px;
  text-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* Wish text */
#wish{
  font-size:1rem;
  line-height:1.8;
  min-height:170px;
  text-align:left;
  opacity:0.95;
}

/* Heart */
.heart{
  font-size:52px;
  margin:28px 0;
  animation:beat 1.4s infinite;
  filter:drop-shadow(0 0 15px rgba(255,105,180,0.8));
}

/* Button */
button{
  padding:14px 25px;
  border:none;
  border-radius:40px;
  background:linear-gradient(90deg,#c77dff,#9d4edd);
  font-size:1rem;
  cursor:pointer;
  width:100%;
  color:white;
  font-weight:600;
  transition:0.35s;
  box-shadow:0 0 20px rgba(157,78,221,0.7);
}

button:hover{
  transform:scale(1.06);
  box-shadow:0 0 35px rgba(157,78,221,0.95);
}

/* Animations */
@keyframes appear{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1}
}

@keyframes beat{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.3)}
}
</style>
</head>

<body>

<!-- Floating love animation -->
<div class="love-layer" id="loveLayer"></div>

<div class="card">
  <h1>My Birthday Wish For You</h1>

  <div id="wish"></div>

  <div class="heart">💜</div>

  <button onclick="next()">See Something Beautiful</button>
</div>

<script>
const text = 
"On your birthday, I wish you more than happiness.\n" +
"I wish you peace on hard days, smiles that stay longer, " +
"and love that always finds you — even when you don’t look for it.\n" +
"You deserve moments that feel magical… just like you.\n" +
"Today isn’t just about celebrating another year — " +
"it’s about celebrating you and everything you bring into this world. 💖";

let i = 0;
const box = document.getElementById("wish");

/* Typewriter effect */
function type(){
  if(i < text.length){
    box.innerHTML += text[i] === "\n" ? "<br>" : text[i];
    i++;
    setTimeout(type, 32);
  }
}
type();

/* Floating hearts */
const layer = document.getElementById("loveLayer");

function createLove(){
  const love = document.createElement("div");
  love.classList.add("love");
  love.innerHTML = "💜";
  love.style.left = Math.random()*100 + "vw";
  love.style.animationDuration = (4 + Math.random()*4) + "s";
  love.style.fontSize = (16 + Math.random()*28) + "px";
  layer.appendChild(love);

  setTimeout(()=>{ love.remove(); }, 9000);
}

setInterval(createLove, 380);

function next(){
  location.href = "photos.html";
}
</script>

</body>
</html>
