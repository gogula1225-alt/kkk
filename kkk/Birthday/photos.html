<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Memories 💜</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
      overflow-x: hidden;
    }

    body {
      background: radial-gradient(circle at top, #5a2a82, #3b145f, #140018);
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      color: white;
      text-align: center;
      padding: 20px;
      position: relative;
    }

    /* Floating hearts */
    .star-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      bottom: -30px;
      font-size: 12px;
      animation: floatUp linear infinite;
      opacity: 0.8;
      color: #e0b3ff;
      filter: drop-shadow(0 0 12px #d18bff);
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) scale(0.6);
        opacity: 0;
      }
      to {
        transform: translateY(-120vh) scale(1.4);
        opacity: 1;
      }
    }

    /* Text */
    h1 {
      margin: 30px 0 10px;
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      letter-spacing: 2px;
      text-shadow: 0 0 25px rgba(220, 170, 255, 0.8);
      position: relative;
      z-index: 2;
      animation: fadeDown 1.5s ease;
    }

    p {
      font-size: 1rem;
      opacity: 0.9;
      position: relative;
      z-index: 2;
      animation: fadeDown 2s ease;
    }

    /* Carousel container */
    .carousel-container {
      margin-top: 50px;
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 8.5 : 15 Ratio Frame */
    .carousel {
      width: 320px;
      height: 565px;
      border-radius: 32px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
      overflow: hidden;
      position: relative;
    }

    /* Images and videos */
    .carousel img,
    .carousel video {
      width: 100%;
      height: 100%;
      object-fit: contain; /* no cropping */
      border-radius: 24px;
      display: none;
      background: black;
    }

    /* Active media */
    .carousel .active {
      display: block;
      animation: fadeIn 0.8s ease;
    }

    /* Controls */
    .controls {
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 25px;
      position: relative;
      z-index: 2;
    }

    .control-btn {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      font-size: 20px;
      background: linear-gradient(135deg, #c77dff, #e0aaff);
      color: #2a0038;
      box-shadow: 0 0 25px rgba(200, 140, 255, 0.8);
      transition: 0.4s;
    }

    .control-btn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 45px rgba(220, 170, 255, 1);
    }

    /* Button */
    .main-btn {
      margin: 55px 0 30px;
      padding: 15px 50px;
      border: none;
      border-radius: 60px;
      font-size: 1.1rem;
      cursor: pointer;
      background: linear-gradient(90deg, #c77dff, #e0aaff);
      font-weight: 600;
      color: #2a0038;
      position: relative;
      z-index: 2;
      transition: 0.4s;
      box-shadow: 0 0 30px rgba(200, 140, 255, 0.8);
    }

    .main-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 55px rgba(220, 170, 255, 1);
    }

    /* Animations */
    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .carousel {
        width: 240px;
        height: 424px;
      }

      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <!-- Floating hearts -->
  <div class="star-layer" id="starLayer"></div>

  <h1>Happiest Birthday Keerthi...💜</h1>
  <p>...my cutie...</p>

  <!-- Media Carousel -->
  <div class="carousel-container">
    <div class="carousel" id="carousel">
      <img src="pic1.jpeg" class="active" alt="Memory 1">
      <video src="intro.mp4" controls></video>
      <video src="video1.mp4" controls></video>
      <video src="video2.mp4" controls></video>
      <video src="video3.mp4" controls></video>
      <video src="video4.mp4" controls></video>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="control-btn" onclick="prev()">⟨</button>
    <button class="control-btn" onclick="nextMedia()">⟩</button>
  </div>

  <button class="main-btn" onclick="nextPage()">One Last Thing… 💜</button>

  <script>
    let index = 0;
    const items = document.querySelectorAll("#carousel img, #carousel video");

    function showMedia(i) {
      items.forEach(item => {
        item.classList.remove("active");

        if (item.tagName === "VIDEO") {
          item.pause();
          item.currentTime = 0;
        }
      });

      items[i].classList.add("active");

      if (items[i].tagName === "VIDEO") {
        items[i].play();
      }
    }

    function nextMedia() {
      index = (index + 1) % items.length;
      showMedia(index);
    }

    function prev() {
      index = (index - 1 + items.length) % items.length;
      showMedia(index);
    }

    function nextPage() {
      location.href = "birthday.html";
    }

    /* Floating purple hearts */
    const layer = document.getElementById("starLayer");

    function createStar() {
      const star = document.createElement("div");
      star.className = "star";
      star.innerHTML = "💜";
      star.style.left = Math.random() * 100 + "vw";
      star.style.animationDuration = (5 + Math.random() * 6) + "s";
      star.style.fontSize = (10 + Math.random() * 18) + "px";
      layer.appendChild(star);

      setTimeout(() => {
        star.remove();
      }, 12000);
    }

    setInterval(createStar, 300);
  </script>

</body>
</html>
